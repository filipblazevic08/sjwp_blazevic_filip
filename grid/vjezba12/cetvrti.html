<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Grid Layout</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    display:grid;
    grid-template-columns: 2fr 1fr 1fr;
    grid-template-rows: 120px 120px;
    gap:15px;
    width:600px;
}

.box{
    background:#555;
    color:white;
    font-size:28px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:8px;
}

.a{
    grid-column:1 / 3;
    grid-row:1;
}

.b{
    grid-column:3;
    grid-row:1 / 3;
}

.c{
    grid-column:1;
    grid-row:2;
}

.d{
    grid-column:2;
    grid-row:2;
}
</style>
</head>

<body>

<div class="container">
    <div class="box a">A</div>
    <div class="box b">B</div>
    <div class="box c">C</div>
    <div class="box d">D</div>
</div>

</body>
</html>
