<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>Grid Zadatak</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
}

.container{
    width: 600px;
    margin: 50px auto;
    padding: 20px;
    border: 1px solid #ccc;

    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

.box{
    background: #4a4a4a;
    color: white;
    font-size: 28px;
    text-align: center;
    padding: 40px 0;
    border-radius: 8px;
}
</style>

</head>
<body>

<div class="container">
    <div class="box">A</div>
    <div class="box">B</div>
    <div class="box">C</div>
    <div class="box">D</div>
    <div class="box">E</div>
    <div class="box">F</div>
</div>

</body>
</html>
